name: _build-app

# Reusable per-app build pipeline. Called by apps.yml (and optionally by
# the thin chess.yml / solitaire.yml wrappers for ad-hoc re-runs).
#
# What it does, given an app name:
#   1. Pull ghcr.io/<owner>/miso-wasm-demo:<image_tag>.
#   2. Run the container to build that app to wasm.
#   3. Upload the built bundle as a workflow artefact.
#   4. Serve out/<app>/ via python3 -m http.server and load it in
#      headless chromium via playwright; assert miso mounted, no
#      pageerrors, capture a screenshot.
#   5. Inline the screenshot into the workflow run summary as a base64
#      data URI so it renders directly on the Actions page — no need
#      to download the smoke-test artefact to glance at the result.
#
# Inputs:
#   app_name   Required. "chess" | "solitaire" | future demos.
#   image_tag  Optional. Defaults to "latest".

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Name of the demo app inside the container (chess | solitaire | …)'
        required: true
        type: string
      image_tag:
        description: 'Tag of ghcr.io/<owner>/miso-wasm-demo to pull (default: latest)'
        required: false
        type: string
        default: latest

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/miso-wasm-demo
  PORT: 8080

jobs:
  build-and-run:
    name: build + smoke-test ${{ inputs.app_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for pushing screenshots to the screenshots branch
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full credentials for the screenshots-branch push later.
          # `persist-credentials: true` is checkout@v6's default but make
          # it explicit so a future bump doesn't silently change it.
          persist-credentials: true

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull miso-wasm-demo image
        run: |
          docker pull "${REGISTRY}/${IMAGE_NAME}:${{ inputs.image_tag }}"

      - name: Build ${{ inputs.app_name }}
        run: |
          mkdir -p out
          docker run --rm \
            -v "$PWD/out:/home/builder/out" \
            "${REGISTRY}/${IMAGE_NAME}:${{ inputs.image_tag }}" \
            "${{ inputs.app_name }}"
          ls -lah "out/${{ inputs.app_name }}/"
          file  "out/${{ inputs.app_name }}/app.wasm"

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.app_name }}-bundle
          path: out/${{ inputs.app_name }}/
          if-no-files-found: error
          retention-days: 30

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install playwright + chromium
        run: |
          npm init -y >/dev/null
          npm install --no-fund --no-audit playwright@1.49.1
          npx playwright install --with-deps chromium

      - name: Smoke-test in headless chromium
        env:
          APP_DIR: out/${{ inputs.app_name }}
          SCREENSHOT_PATH: ${{ runner.temp }}/${{ inputs.app_name }}-screenshot.png
          LOG_PATH: ${{ runner.temp }}/${{ inputs.app_name }}-browser.log
        run: |
          set -euo pipefail
          (cd "$APP_DIR" && python3 -m http.server "$PORT") >/tmp/httpd.log 2>&1 &
          HTTPD_PID=$!
          trap "kill $HTTPD_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            curl -fsS "http://127.0.0.1:${PORT}/index.html" >/dev/null && break
            sleep 0.5
          done
          curl -fsSI "http://127.0.0.1:${PORT}/app.wasm" | head -1
          node .github/scripts/smoke.mjs "http://127.0.0.1:${PORT}/" \
               "$SCREENSHOT_PATH" "$LOG_PATH"

      # ---------------------------------------------------------------
      # Publish the screenshot to an orphan `screenshots` branch so we
      # have a stable HTTPS URL the run-summary markdown sanitiser will
      # accept (it strips data: URIs, our first attempt — hence the
      # branch hop).
      #
      # Layout on the branch:
      #   <app>/latest.png      always overwritten with the latest run
      #   <app>/<sha>.png       per-commit archive copy
      #
      # The branch is orphan and starts empty; per-app commits add or
      # update files only. Concurrency: chess + solitaire run in
      # parallel and both push to the same branch; we use git's atomic
      # ref update + retry loop to handle the race.
      # ---------------------------------------------------------------
      - name: Publish screenshot to `screenshots` branch
        id: publish
        if: ${{ always() && github.event_name != 'pull_request' }}
        env:
          SCREENSHOT_PATH: ${{ runner.temp }}/${{ inputs.app_name }}-screenshot.png
          APP: ${{ inputs.app_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ ! -s "$SCREENSHOT_PATH" ]; then
            echo "no_screenshot=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          short_sha=$(printf %.7s "$SHA")
          wt=/tmp/screenshots-wt
          # Fetch the screenshots branch if it exists; else create an
          # orphan worktree to seed it.
          if git ls-remote --exit-code --heads origin screenshots >/dev/null 2>&1; then
            git fetch --depth 1 origin screenshots
            git worktree add -B screenshots "$wt" origin/screenshots
          else
            git worktree add --detach "$wt" "$(git rev-parse HEAD)"
            git -C "$wt" checkout --orphan screenshots
            git -C "$wt" rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "$wt/$APP"
          cp "$SCREENSHOT_PATH" "$wt/$APP/latest.png"
          cp "$SCREENSHOT_PATH" "$wt/$APP/${short_sha}.png"
          git -C "$wt" config user.name  "github-actions[bot]"
          git -C "$wt" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$wt" add "$APP/latest.png" "$APP/${short_sha}.png"
          if git -C "$wt" diff --staged --quiet; then
            echo "no changes to screenshots branch"
          else
            git -C "$wt" commit -m "screenshots: ${APP} @ ${short_sha}"
          fi
          # Push with retry-on-non-fast-forward (the parallel app jobs
          # race for this same branch).
          for i in 1 2 3 4 5; do
            if git -C "$wt" push origin HEAD:screenshots; then
              break
            fi
            echo "push race, attempt $i — rebasing"
            git -C "$wt" fetch --depth 1 origin screenshots
            git -C "$wt" rebase origin/screenshots
          done
          # raw.githubusercontent URLs for the run summary.
          {
            echo "screenshot_latest_url=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/screenshots/${APP}/latest.png"
            echo "screenshot_sha_url=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/screenshots/${APP}/${short_sha}.png"
          } >> "$GITHUB_OUTPUT"

      - name: Embed screenshot in run summary
        if: always()
        env:
          SCREENSHOT_PATH: ${{ runner.temp }}/${{ inputs.app_name }}-screenshot.png
          LOG_PATH: ${{ runner.temp }}/${{ inputs.app_name }}-browser.log
          IMG_URL: ${{ steps.publish.outputs.screenshot_sha_url }}
        run: |
          set -euo pipefail
          {
            echo "## ${{ inputs.app_name }} — smoke test result"
            echo
            if [ -n "$IMG_URL" ]; then
              size=$(wc -c <"$SCREENSHOT_PATH" | awk '{print $1}')
              echo "Screenshot (${size} bytes):"
              echo
              # raw.githubusercontent URL — GitHub's markdown sanitiser
              # accepts these; data: URIs are stripped to broken <img>.
              echo "![${{ inputs.app_name }} screenshot](${IMG_URL})"
            elif [ -s "$SCREENSHOT_PATH" ]; then
              echo "_(Screenshot captured but not published; available in the smoke artefact.)_"
            else
              echo "_No screenshot was produced (smoke test likely failed before navigation)._"
            fi
            echo
            if [ -s "$LOG_PATH" ]; then
              echo "<details><summary>Browser console + smoke.mjs log</summary>"
              echo
              echo '```'
              tail -n 60 "$LOG_PATH"
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload screenshot + browser log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.app_name }}-smoke
          path: |
            ${{ runner.temp }}/${{ inputs.app_name }}-screenshot.png
            ${{ runner.temp }}/${{ inputs.app_name }}-browser.log
          if-no-files-found: warn
          retention-days: 30
