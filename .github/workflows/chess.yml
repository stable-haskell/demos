name: chess

# Thin wrapper around _build-app.yml so the chess pipeline appears as a
# top-level workflow in the Actions sidebar — useful for ad-hoc re-runs
# of just chess (workflow_dispatch) and for the weekly chess-only
# canary (cron). The full DAG (image build -> chess + solitaire) lives
# in apps.yml.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to pull (default: latest)'
        required: false
        type: string
        default: latest
  schedule:
    - cron: '0 7 * * 1'   # Monday 07:00 UTC — independent canary

concurrency:
  group: chess-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chess:
    name: chess
    permissions:
      contents: write   # passes through to _build-app.yml screenshots push
      packages: read
    uses: ./.github/workflows/_build-app.yml
    with:
      app_name: chess
      image_tag: ${{ inputs.image_tag || 'latest' }}
