name: Apps DAG

# Single source of truth for the pipeline.
#
# DAG (all four jobs live in ONE run, no workflow_run choreography):
#
#       build-image (amd64) ─┐
#                            ├─> merge-image ─┬─> chess
#       build-image (arm64) ─┘                └─> solitaire
#
# Triggers:
#   * push to main on miso-wasm-demo/** or workflow files
#   * pull request (image build only, no push; per-app jobs still run
#     against the freshly-built local image — see _build-app.yml note)
#   * weekly Monday cron canary (catches drift in NodeSource, the
#     stable-haskell channels, ghc-wasm-bindists, etc.)
#   * workflow_dispatch
#
# The per-app jobs call ./.github/workflows/_build-app.yml (reusable);
# adding a third demo app is one new `needs: merge-image` block, not a
# new ~80-line workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: apps-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/miso-wasm-demo

jobs:
  # -------------------------------------------------------------------
  # Per-arch native build, push by digest. PRs build without pushing.
  # -------------------------------------------------------------------
  build-image:
    name: build-image / ${{ matrix.platform-short }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform-short: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform-short: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ./miso-wasm-demo
          file: ./miso-wasm-demo/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: |
            ${{ github.event_name == 'pull_request' && 'type=docker' || format('type=image,name={0}/{1},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.IMAGE_NAME) }}
          cache-from: type=gha,scope=miso-wasm-demo-${{ matrix.platform-short }}
          cache-to:   type=gha,scope=miso-wasm-demo-${{ matrix.platform-short }},mode=max

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.platform-short }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  # Combine per-arch digests into a multi-arch manifest (:latest, :sha,
  # :branch). Skipped on PRs (no push).
  # -------------------------------------------------------------------
  merge-image:
    name: merge multi-arch manifest
    needs: build-image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Create manifest & push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect resulting image
        run: |
          docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  # -------------------------------------------------------------------
  # Per-app build + smoke-test. Each is a single line here — the actual
  # job body lives in _build-app.yml so adding a new demo is trivial.
  # -------------------------------------------------------------------
  chess:
    name: chess
    needs: merge-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: write   # passes through to _build-app.yml's screenshots-branch push
      packages: read
    uses: ./.github/workflows/_build-app.yml
    with:
      app_name: chess
      image_tag: latest

  solitaire:
    name: solitaire
    needs: merge-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: write   # passes through to _build-app.yml's screenshots-branch push
      packages: read
    uses: ./.github/workflows/_build-app.yml
    with:
      app_name: solitaire
      image_tag: latest
