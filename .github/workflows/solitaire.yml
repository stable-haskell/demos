name: solitaire

# Thin wrapper around _build-app.yml — see chess.yml's comment.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to pull (default: latest)'
        required: false
        type: string
        default: latest
  schedule:
    - cron: '30 7 * * 1'   # 30 min after chess.yml canary

concurrency:
  group: solitaire-${{ github.ref }}
  cancel-in-progress: true

jobs:
  solitaire:
    name: solitaire
    permissions:
      contents: write   # passes through to _build-app.yml screenshots push
      packages: read
    uses: ./.github/workflows/_build-app.yml
    with:
      app_name: solitaire
      image_tag: ${{ inputs.image_tag || 'latest' }}
