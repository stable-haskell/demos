name: solitaire — build & run

# ---------------------------------------------------------------------
# Identical shape to chess.yml — same image, same smoke-test recipe.
# See chess.yml's header comment for the full flow.
# ---------------------------------------------------------------------

on:
  workflow_run:
    workflows: ["Build & publish miso-wasm-demo image"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: '30 7 * * 1'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to use (default: latest)'
        required: false
        default: latest

concurrency:
  group: solitaire-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/miso-wasm-demo
  IMAGE_TAG:  ${{ inputs.image_tag || 'latest' }}
  APP_NAME:   solitaire
  PORT:       8080

jobs:
  build-and-run:
    name: build + smoke-test solitaire
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull miso-wasm-demo image
        run: |
          docker pull "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Build solitaire
        run: |
          mkdir -p out
          docker run --rm \
            -v "$PWD/out:/home/builder/out" \
            "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" \
            "${APP_NAME}"
          ls -lah "out/${APP_NAME}/"
          file  "out/${APP_NAME}/app.wasm"

      - name: Upload solitaire bundle
        uses: actions/upload-artifact@v4
        with:
          name: solitaire-bundle
          path: out/${{ env.APP_NAME }}/
          if-no-files-found: error
          retention-days: 30

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install playwright + chromium
        run: |
          npm init -y >/dev/null
          npm install --no-fund --no-audit playwright@1.49.1
          npx playwright install --with-deps chromium

      - name: Smoke-test in headless chromium
        env:
          APP_DIR: out/${{ env.APP_NAME }}
          SCREENSHOT_PATH: ${{ runner.temp }}/solitaire-screenshot.png
          LOG_PATH: ${{ runner.temp }}/solitaire-browser.log
        run: |
          set -euo pipefail
          (cd "$APP_DIR" && python3 -m http.server "$PORT") >/tmp/httpd.log 2>&1 &
          HTTPD_PID=$!
          trap "kill $HTTPD_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 20); do
            curl -fsS "http://127.0.0.1:${PORT}/index.html" >/dev/null && break
            sleep 0.5
          done
          curl -fsSI "http://127.0.0.1:${PORT}/app.wasm" | head -1
          node .github/scripts/smoke.mjs "http://127.0.0.1:${PORT}/" \
               "$SCREENSHOT_PATH" "$LOG_PATH"

      - name: Upload screenshot + browser log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solitaire-smoke
          path: |
            ${{ runner.temp }}/solitaire-screenshot.png
            ${{ runner.temp }}/solitaire-browser.log
          if-no-files-found: warn
          retention-days: 30
